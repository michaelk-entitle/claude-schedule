# claude-schedule is a Claude Code plugin — a skill (instructions) plus one stdlib-only
# hook script (scripts/hook.py). It is not a packaged/installable app, so this file only
# configures the dev tools.

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.10"
warn_unused_ignores = true
disallow_untyped_defs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
